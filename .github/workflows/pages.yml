name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp tests.html _site/ 2>/dev/null || true
          cp README.md _site/ 2>/dev/null || true
          # Verify constraint: no imports/external refs in shipped HTML
          if grep -E '(\bimport[ (]|<script[^>]+src|<link[^>]+href|@import)' _site/index.html; then
            echo "::error::index.html contains forbidden imports/external references"
            exit 1
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
